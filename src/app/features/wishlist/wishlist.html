<div class="p-6 max-w-6xl mx-auto">

  <h2 class="text-2xl font-bold mb-6">My Wishlist ❤️</h2>

  <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-5">

    <div *ngFor="let p of wishlistItems"
         class="border rounded-lg p-3 hover:shadow-lg transition">

      <!-- IMAGE -->
      <img [src]="p.image"
           class="h-44 w-full object-cover rounded" />

      <!-- INFO -->
      <h3 class="text-sm mt-2 line-clamp-2">
        {{ p.name }}
      </h3>

      <p class="text-red-500 font-bold mt-1">
        ₹{{ p.price }}
      </p>

      <!-- BUTTONS -->
      <div class="flex justify-between items-center mt-3">

        <button
          (click)="moveToCart(p)"
          class="text-xs bg-yellow-400 px-2 py-1 rounded hover:bg-yellow-500">
          Move to Cart
        </button>

        <button (click)="remove(p.id)"
                class="text-red-500 text-lg">
          ❌
        </button>

      </div>

    </div>

  </div>

</div>

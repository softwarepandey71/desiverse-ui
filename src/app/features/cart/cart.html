<div class="p-6 max-w-7xl mx-auto grid md:grid-cols-3 gap-6">

  <!-- 🛒 LEFT: CART ITEMS -->
  <div class="md:col-span-2">

    <h1 class="text-2xl font-bold mb-4">Shopping Cart 🛒</h1>

    <div *ngIf="items.length === 0" class="text-gray-500">
      Your cart is empty
    </div>

    <div *ngFor="let item of items"
         class="flex gap-4 border rounded-lg p-4 mb-4 shadow-sm hover:shadow-md transition">

      <!-- IMAGE -->
      <img [src]="item.image"
           class="w-28 h-28 object-cover rounded border" />

      <!-- DETAILS -->
      <div class="flex-1">

        <h3 class="font-semibold text-lg line-clamp-2">
          {{ item.name }}
        </h3>

        <p class="text-red-600 font-bold mt-1 text-lg">
          ₹{{ item.price }}
        </p>

        <!-- QUANTITY -->
        <div class="flex items-center gap-3 mt-3">

          <button (click)="decrease(item)"
                  class="px-3 py-1 border rounded hover:bg-gray-100">-</button>

          <span class="font-medium">{{ item.quantity || 1 }}</span>

          <button (click)="increase(item)"
                  class="px-3 py-1 border rounded hover:bg-gray-100">+</button>

        </div>

      </div>

      <!-- REMOVE -->
      <button (click)="remove(item.id)"
              class="text-red-500 font-bold text-xl hover:scale-110 transition">
        ✖
      </button>

    </div>

  </div>

  <!-- 💰 RIGHT: SUMMARY -->
  <div class="sticky top-20 h-fit border rounded-lg p-5 shadow-sm">

    <h2 class="text-xl font-bold mb-4">Order Summary</h2>

    <div class="flex justify-between text-sm mb-2">
      <span>Items</span>
      <span>{{ items.length }}</span>
    </div>

    <div class="flex justify-between text-sm mb-2">
      <span>Subtotal</span>
      <span>₹{{ total() }}</span>
    </div>

    <div class="flex justify-between text-sm mb-2">
      <span>Delivery</span>
      <span class="text-green-600">FREE</span>
    </div>

    <div class="border-t mt-3 pt-3 flex justify-between font-bold text-lg">
      <span>Total</span>
      <span>₹{{ total() }}</span>
    </div>

    <button (click)="checkout()"
            class="mt-5 w-full bg-black text-white py-2 rounded hover:bg-gray-800 transition">
      Proceed to Checkout
    </button>

  </div>

</div>

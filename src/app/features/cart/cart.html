<div class="p-6">

  <h1 class="text-2xl font-bold mb-4">Your Cart</h1>

  <div *ngFor="let item of items"
       class="flex justify-between border-b py-3">

    <div>
      <h3>{{ item.name }}</h3>
      <p>₹{{ item.price }} x {{ item.qty }}</p>
    </div>

    <button (click)="remove(item.id)" class="text-red-500">
      Remove
    </button>
  </div>

  <div class="mt-4 font-bold text-xl">
    Total: ₹{{ total() }}
  </div>

  <button (click)="checkout()"
    class="mt-4 bg-black text-white px-6 py-2 rounded">
    Checkout
  </button>

</div>

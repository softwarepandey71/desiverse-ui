<div class="p-6 bg-gray-100 min-h-screen">

  <h1 class="text-2xl font-bold mb-6">Your Orders</h1>

  <div *ngFor="let order of orders"
       class="bg-white rounded-xl shadow mb-6 p-4">

    <!-- Header -->
    <div class="flex justify-between border-b pb-3 mb-3">
      <div>
        <p class="text-sm text-gray-500">Order ID</p>
        <p class="font-semibold">{{ order.id }}</p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Total</p>
        <p class="font-semibold">₹{{ order.total }}</p>
      </div>

      <div>
        <p class="text-sm text-gray-500">Status</p>
        <p class="font-semibold"
           [ngClass]="getStatusClass(order.status)">
          {{ order.status }}
        </p>
      </div>
    </div>

    <!-- 🧭 TRACKING BAR -->
    <div class="mb-4">

      <div class="flex justify-between text-xs mb-1">
        <span>Placed</span>
        <span>Shipped</span>
        <span>Delivered</span>
      </div>

      <div class="w-full bg-gray-200 h-2 rounded">
        <div class="h-2 rounded transition-all duration-500"
          [style.width]="
            order.status === 'PLACED' ? '33%' :
            order.status === 'SHIPPED' ? '66%' :
            order.status === 'DELIVERED' ? '100%' : '0%'
          "
          [ngClass]="{
            'bg-yellow-500': order.status === 'PLACED',
            'bg-blue-500': order.status === 'SHIPPED',
            'bg-green-500': order.status === 'DELIVERED'
          }">
        </div>
      </div>

    </div>

    <!-- Items -->
    <div *ngFor="let item of order.items"
         class="flex justify-between border-t py-2">

      <div>
        <p class="font-medium">{{ item.name }}</p>
        <p class="text-sm text-gray-500">
          Qty: {{ item.qty }}
        </p>
      </div>

      <p class="font-semibold">₹{{ item.price }}</p>

    </div>

  </div>

</div>

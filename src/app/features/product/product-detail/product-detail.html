<div class="grid md:grid-cols-2 gap-8 p-6">

  <!-- 🔥 LEFT: IMAGE SECTION -->
  <div>

    <!-- MAIN IMAGE -->
    <div class="border rounded-lg overflow-hidden">
      <img
        [src]="selectedImage + '?w=600&h=600&fit=crop'"
        class="w-full h-[400px] object-cover transition duration-300"
        [ngStyle]="zoomStyle"
        (mousemove)="zoom($event)"
        (mouseleave)="resetZoom()"
      />
    </div>

    <!-- 🔹 THUMBNAILS -->
    <div class="flex gap-2 mt-4">
      <img *ngFor="let img of product.images"
           [src]="img + '?w=100&h=100&fit=crop'"
           (click)="changeImage(img)"
           class="w-20 h-20 object-cover border rounded cursor-pointer hover:scale-105 transition"/>
    </div>

  </div>

  <!-- 🛒 RIGHT: PRODUCT INFO -->
  <div>

    <h1 class="text-2xl font-bold">
      {{ product.name }}
    </h1>

    <!-- ⭐ Rating -->
    <div class="text-yellow-500 mt-2">
      ★★★★☆ (120 reviews)
    </div>

    <!-- 💰 PRICE -->
    <div class="mt-4">
      <span class="text-3xl font-bold text-red-600">
        ₹{{ product.price }}
      </span>

      <span class="line-through text-gray-400 ml-3">
        ₹{{ product.oldPrice }}
      </span>
    </div>

    <!-- 📄 DESCRIPTION -->
    <p class="mt-4 text-gray-600">
      {{ product.description }}
    </p>

    <!-- 🧵 DETAILS -->
    <div class="mt-4 text-sm space-y-1">
      <p><b>Fabric:</b> {{ product.fabric }}</p>
      <p><b>Color:</b> {{ product.color }}</p>
      <p><b>Type:</b> {{ product.type }}</p>
    </div>
    

    <!-- 🛒 BUTTONS -->
    <div class="mt-6 flex gap-4">

      <button
        (click)="addToCart(product.id)"
        class="bg-yellow-500 hover:bg-yellow-600 text-black px-6 py-2 rounded font-semibold">
        Add to Cart
      </button>

      <button
        class="bg-orange-500 hover:bg-orange-600 text-white px-6 py-2 rounded font-semibold">
        Buy Now
      </button>

    </div>

  </div>
  <div *ngIf="showToast"
     class="fixed bottom-5 right-5 bg-black text-white px-4 py-2 rounded shadow">
  Item added to cart 🛒
</div>

</div>

<div class="flex gap-6 p-4">

    <!-- 🔹 SIDEBAR -->
    <aside class="w-64 hidden md:block">

        <!-- CATEGORY -->
        <h2 class="font-bold mb-3">Category</h2>

        <div class="space-y-2 text-sm">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" (change)="toggleCategory('Saree', $event)" />
                Sarees
            </label>

            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" (change)="toggleCategory('Ready', $event)" />
                Ready To Wear
            </label>

            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" (change)="toggleCategory('Silk', $event)" />
                Silk Sarees
            </label>
        </div>

        <!-- PRICE -->
        <h2 class="font-bold mt-6 mb-3">Price</h2>

        <input type="range" min="0" max="5000"
               [(ngModel)]="maxPrice"
               (input)="applyFilters()"
               class="w-full cursor-pointer" />

        <p class="text-sm text-gray-600 mt-1">
            Up to ₹{{ maxPrice }}
        </p>

        <!-- DISCOUNT -->
        <h2 class="font-bold mt-6 mb-2">Discount</h2>

        <div class="space-y-2 text-sm ">
            <label class="flex gap-2 items-center cursor-pointer">
                <input type="radio" name="discount"
                       (change)="selectedDiscount = 50; applyFilters()" />
                50% or more
            </label>

            <label class="flex gap-2 items-center cursor-pointer">
                <input type="radio" name="discount"
                       (change)="selectedDiscount = 70; applyFilters()" />
                70% or more
            </label>

            <label class="flex gap-2 items-center cursor-pointer">
                <input type="radio" name="discount"
                       (change)="selectedDiscount = null; applyFilters()" />
                All
            </label>
        </div>

        <!-- 🎨 COLOR -->
        <h2 class="font-bold mt-6 mb-3">Color</h2>

        <div class="flex flex-wrap gap-2">
            <span class="w-6 h-6 rounded-full bg-red-500 cursor-pointer border"
                  [class.ring-2]="selectedColors.includes('Red')"
                  (click)="toggleColor('Red')"></span>

            <span class="w-6 h-6 rounded-full bg-green-500 cursor-pointer border"
                  [class.ring-2]="selectedColors.includes('Green')"
                  (click)="toggleColor('Green')"></span>

            <span class="w-6 h-6 rounded-full bg-blue-500 cursor-pointer border"
                  [class.ring-2]="selectedColors.includes('Blue')"
                  (click)="toggleColor('Blue')"></span>

            <span class="w-6 h-6 rounded-full bg-yellow-400 cursor-pointer border"
                  [class.ring-2]="selectedColors.includes('Yellow')"
                  (click)="toggleColor('Yellow')"></span>

            <span class="w-6 h-6 rounded-full bg-black cursor-pointer border"
                  [class.ring-2]="selectedColors.includes('Black')"
                  (click)="toggleColor('Black')"></span>
        </div>

        <!-- 👗 TYPE -->
        <h2 class="font-bold mt-6 mb-3">Type</h2>

        <div class="space-y-2 text-sm ">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" (change)="toggleType('Casual', $event)" />
                Casual
            </label>

            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" (change)="toggleType('Party', $event)" />
                Party Wear
            </label>

            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" (change)="toggleType('Wedding', $event)" />
                Wedding
            </label>
        </div>

        <!-- 🧵 FABRIC -->
        <h2 class="font-bold mt-6 mb-3">Fabric</h2>

        <div class="space-y-2 text-sm ">
            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" (change)="toggleFabric('Silk', $event)" />
                Silk
            </label>

            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" (change)="toggleFabric('Cotton', $event)" />
                Cotton
            </label>

            <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" (change)="toggleFabric('Georgette', $event)" />
                Georgette
            </label>
        </div>

        <!-- RESET -->
        <button (click)="resetFilters()"
                class="mt-6 w-full border p-2 rounded text-sm hover:bg-gray-100 cursor-pointer">
            Reset Filters
        </button>

    </aside>

    <!-- 🔹 MAIN -->
    <div class="flex-1">

        <!-- TOP BAR -->
        <div class="flex justify-between items-center mb-4 cursor-pointer">

            <p class="text-sm text-gray-600">
                {{ filteredProducts.length }} products
            </p>

            <div class="flex justify-between items-center mb-4 gap-3 cursor-pointer">

  <!-- 🔍 SEARCH -->
  <input
    type="text"
    placeholder="Search for products..."
    (input)="onSearch($event)"
    class="border p-2 rounded w-full max-w-md" />

  <!-- SORT -->
  <select #sortSelect
          (change)="sortType = sortSelect.value; applyFilters()"
          class="border p-2 rounded cursor-pointer">

    <option value="">Sort by</option>
    <option value="low">Price Low → High</option>
    <option value="high">Price High → Low</option>

  </select>

</div>

        </div>

        <!-- PRODUCT GRID -->
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">

            <div *ngFor="let p of filteredProducts" (click)="goToDetail(p.id)"
                 class="border rounded-lg overflow-hidden hover:shadow-lg transition cursor-pointer">

                <!-- IMAGE -->
                <div class="relative">

                    <img [src]="p.image"
                         alt="product image"
                         class="h-60 w-full object-cover" />

                    <!-- DISCOUNT -->
                    <span class="absolute top-2 left-2 bg-red-500 text-white text-xs px-2 py-1 rounded">
                        {{ getDiscount(p) }}% OFF
                    </span>

                </div>

                <!-- INFO -->
                <div class="p-3">

                    <h3 class="text-sm font-medium line-clamp-2">
                        {{ p.name }}
                    </h3>

                    <!-- PRICE -->
                    <div class="mt-2">
                        <span class="text-lg font-bold text-red-600">
                            ₹{{ p.price }}
                        </span>

                        <span class="text-gray-400 line-through ml-2 text-sm">
                            ₹{{ p.oldPrice }}
                        </span>
                    </div>

                    <!-- EXTRA INFO -->
                    <div class="text-xs text-gray-500 mt-1">
                        {{ p.fabric }} • {{ p.type }} • {{ p.color }}
                    </div>

                    <!-- RATING -->
                    <div class="text-yellow-500 text-sm mt-1">
                        ★★★★☆
                    </div>
                    <button
  (click)="toggleWishlist(p.id); $event.stopPropagation()"
  class="text-2xl">
  {{ wishlistMap[p.id] ? '❤️' : '🤍' }}
</button>

                </div>

            </div>

        </div>

    </div>

</div>

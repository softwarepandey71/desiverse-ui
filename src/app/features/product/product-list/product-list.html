<div class="flex gap-6 p-6">

    <!-- 🧱 SIDEBAR FILTER -->
    <div class="w-64 bg-white p-4 rounded-xl shadow">

        <h2 class="font-bold mb-4">Filters</h2>

        <!-- Search -->
        <input [(ngModel)]="search" (input)="applyFilters()" placeholder="Search..."
            class="w-full border p-2 rounded mb-4" />

        <!-- Price -->
        <div class="mb-4">
            <label class="text-sm">Min Price</label>
            <input type="number" [(ngModel)]="minPrice" (input)="applyFilters()" class="w-full border p-1 rounded" />
        </div>

        <div>
            <label class="text-sm">Max Price</label>
            <input type="number" [(ngModel)]="maxPrice" (input)="applyFilters()" class="w-full border p-1 rounded" />
        </div>

    </div>

    <!-- 🛍 PRODUCT GRID -->
    <div class="flex-1">

        <!-- Header -->
        <div class="flex justify-between mb-4">
            <h2 class="text-xl font-bold">Products</h2>
            <span class="text-gray-500">{{ filtered.length }} results</span>
        </div>

        <!-- Grid -->
        <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">

            <div *ngFor="let p of paginated" class="bg-white p-4 rounded-xl shadow hover:shadow-lg transition">

                <!-- Image -->
                <div class="h-40 bg-gray-100 rounded mb-3"></div>

                <!-- Name -->
                <h3 class="font-semibold text-sm mb-1">
                    {{ p.name }}
                </h3>

                <!-- Price -->
                <p class="text-lg font-bold text-green-600">
                    ₹{{ p.price }}
                </p>

                <!-- Rating (fake) -->
                <p class="text-yellow-500 text-sm">⭐⭐⭐⭐☆</p>

                <!-- Button -->
                <button (click)="addToCart(p)" class="mt-3 w-full bg-yellow-400 hover:bg-yellow-500 py-1 rounded">
                    Add to Cart
                </button>

            </div>

        </div>

        <!-- 📄 PAGINATION -->
        <div class="flex justify-center mt-6 gap-2">

            <button *ngFor="let p of [].constructor(totalPages()); let i = index" (click)="page = i + 1"
                class="px-3 py-1 border rounded" [class.bg-black]="page === i + 1" [class.text-white]="page === i + 1">
                {{ i + 1 }}
            </button>

        </div>

    </div>

</div>
